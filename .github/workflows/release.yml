name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-macos-x64:
    runs-on: macos-15-intel

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build x64 DMG
        run: npm run dist:mac:x64
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Desktopflow-x64-dmg
          path: dist/*-x64.dmg
          if-no-files-found: error

      - name: Upload DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*-x64.dmg
          generate_release_notes: true

      - name: Check out Homebrew tap
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/checkout@v4
        with:
          repository: alex-md/homebrew-desktopflow
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update Homebrew cask
        if: startsWith(github.ref, 'refs/tags/')
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          SHA256=$(shasum -a 256 "dist/Desktopflow-${VERSION}-x64.dmg" | awk '{print $1}')

          cat > homebrew-tap/Casks/desktopflow.rb <<EOF
          cask "desktopflow" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/alex-md/desktopflow/releases/download/v#{version}/Desktopflow-#{version}-x64.dmg"
            name "Desktopflow"
            desc "Desktop automation workspace for recording and running flows"
            homepage "https://github.com/alex-md/desktopflow"

            depends_on macos: ">= :sonoma"

            app "Desktopflow.app"

            zap trash: [
              "~/Library/Application Support/Desktopflow",
              "~/Library/Preferences/com.desktopflow.app.plist",
              "~/Library/Saved Application State/com.desktopflow.app.savedState"
            ]
          end
          EOF

      - name: Commit Homebrew cask update
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/desktopflow.rb
          git diff --cached --quiet && exit 0
          git commit -m "Update Desktopflow cask for ${GITHUB_REF_NAME}"
          git push
